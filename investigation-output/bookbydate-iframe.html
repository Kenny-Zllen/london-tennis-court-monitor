                clubsparkApp.AppSettings.adminOnlyBookings = data.AdminOnlyBookings;
                clubsparkApp.AppSettings.paymentEnabled = data.PaymentEnabled;
                clubsparkApp.AppSettings.defaultIntervalDuration = data.DefaultInterval;

                clubsparkApp.AppSettings.isReadOnly = false;
                clubsparkApp.AppSettings.refreshBookingSheet = 0;
                clubsparkApp.AppSettings.bookingAvailabilityOffset = data.NewDayBookingAvailabilityTime;
                myBookingByDate.init(jQuery('#book-by-date-view'));
            });

        })(window, jQuery);
